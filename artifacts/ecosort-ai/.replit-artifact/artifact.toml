kind = "web"
previewPath = "/"
title = "EcoSort AI"
version = "1.0.0"
id = "artifacts/ecosort-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19505

[services.development]
run = "pnpm --filter @workspace/ecosort-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecosort-ai", "run", "build" ]
publicDir = "artifacts/ecosort-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19505"
BASE_PATH = "/"
